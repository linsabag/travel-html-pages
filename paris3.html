<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פריז - העיר השיקגו של אירופה</title>
    <style>
        /* RTL CSS Design */
        body {
            font-family: Arial, sans-serif;
            direction: rtl;
        }
        
        .container {
            width: 80%;
            margin: 0 auto;
        }
        
        .header {
            background-color: #333;
            color: #fff;
            padding: 20px;
        }
        
        .main-content {
            background-color: #f0f0f0;
            padding: 20px;
        }
        
        .images {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        
        .image {
            width: 30%;
            padding: 10px;
        }
        
        .image img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
        }
        
        .recommended-attractions {
            padding: 20px;
            background-color: #f0f0f0;
        }
        
        .recommended-attractions ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .recommended-attractions li {
            padding: 10px;
            border-bottom: 1px solid #ccc;
        }
        
        .recommended-attractions li:last-child {
            border-bottom: none;
        }
        
        .google-maps {
            padding: 20px;
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>פריז - העיר השיקגו של אירופה</h1>
            <p> פריז, הבירה של צרפת, היא עיר מופלאה שבידיים ובלילה. כל אחד בדחל מבקש את תשומת הלב של פריז. </p>
        </div>
        <div class="main-content">
            <div class="images">
                <div class="image">
                    <img src="https://source.unsplash.com/1200x800/?Paris,tourist" alt="Paris">
                </div>
                <div class="image">
                    <img src="https://source.unsplash.com/1200x800/?Paris,nightlife" alt="Paris">
                </div>
                <div class="image">
                    <img src="https://source.unsplash.com/1200x800/?Paris,culture" alt="Paris">
                </div>
            </div>
            <div class="recommended-attractions">
                <h2>מקומות לביקור</h2>
                <ul>
                    <li>אייפל: האייפל הוא אחד המבנים הידועים והמצביעים הקלאסים של עיר.</li>
                    <li>נוטר דאם: הקתדרלה המרכזית</li>
                    <li>פארק מונסו: פארק ירוק שגדוש באולמות כיסאות.</li>
                </ul>
            </div>
        </div>
        <div class="google-maps">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2525.1112351435117!2d2.294333415119965!3d48.85837001000001!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47e66e43668ee471%3A0x6bf1e4e1f0b0f9b6!2zNTQsMjY5LjAiTiAwMjQ!5e0!3m2!1sen!2s!4v1684341241914!5m2!1sen!2s&mapthr=5" width="100%" height="500" frameborder="0" style="border:0" allowfullscreen></iframe>
        </div>
    </div>
</body>
</html>
